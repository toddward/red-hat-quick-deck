<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link href="https://cdn.jsdelivr.net/npm/@rhds/tokens@3.0.2/css/global.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&family=Red+Hat+Text:wght@400;500;700&family=Red+Hat+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* =========================================================
       PALETTES — deck-wide palette variables. The render script
       sets `body.mode-dark | mode-light | mode-expressive` from
       the front-matter `class:` directive.
       These live in the shell (not the theme) because Marpit
       rewrites `:root` into section-scoped selectors that break
       cascade for deck-level variables.
       ========================================================= */

    body.mode-dark {
      color-scheme: dark;
      --bg-primary: #000000;
      --bg-secondary: #1f1f1f;
      --bg-surface: #292929;
      --text-primary: #ffffff;
      --text-secondary: #c7c7c7;
      --text-muted: #a3a3a3;
      --accent: #ee0000;
      --accent-dark: #a60000;
      --accent-light: #f56e6e;
      --tag-border: #383838;
      --icon-filter: brightness(0) invert(1);
      --icon-filter-accent: invert(12%) sepia(100%) saturate(10000%) hue-rotate(0deg) brightness(95%);
      --glow-opacity: 0.08;
      --glow-opacity-hero: 0.14;
      --arch-box-bg: rgba(41, 41, 41, 0.6);
      --arch-box-border: #383838;
      --code-bg: rgba(255, 255, 255, 0.06);
      --code-surface: rgba(255, 255, 255, 0.04);
      --notes-bg: rgba(20, 20, 20, 0.97);
      --notes-shadow: -8px 0 24px rgba(0, 0, 0, 0.5);
      --hl-teal: transparent;
      --hl-purple: transparent;
    }

    body.mode-light {
      color-scheme: light;
      --bg-primary: #ffffff;
      --bg-secondary: #f2f2f2;
      --bg-surface: #e0e0e0;
      --text-primary: #151515;
      --text-secondary: #4d4d4d;
      --text-muted: #707070;
      --accent: #ee0000;
      --accent-dark: #a60000;
      --accent-light: #a60000;
      --tag-border: #c7c7c7;
      --icon-filter: none;
      --icon-filter-accent: invert(12%) sepia(100%) saturate(10000%) hue-rotate(0deg) brightness(95%);
      --glow-opacity: 0.04;
      --glow-opacity-hero: 0.08;
      --arch-box-bg: rgba(242, 242, 242, 0.8);
      --arch-box-border: #c7c7c7;
      --code-bg: rgba(0, 0, 0, 0.05);
      --code-surface: rgba(0, 0, 0, 0.03);
      --notes-bg: rgba(250, 250, 250, 0.98);
      --notes-shadow: -8px 0 24px rgba(0, 0, 0, 0.18);
      --hl-teal: transparent;
      --hl-purple: transparent;
    }

    body.mode-expressive {
      color-scheme: dark;
      --bg-primary: #1b0d33;
      --bg-secondary: #000000;
      --bg-surface: #21134d;
      --text-primary: #ffffff;
      --text-secondary: #d0c5f4;
      --text-muted: #b6a6e9;
      --accent: #ee0000;
      --accent-dark: #a60000;
      --accent-light: #f56e6e;
      --tag-border: #3d2785;
      --icon-filter: brightness(0) invert(1);
      --icon-filter-accent: invert(12%) sepia(100%) saturate(10000%) hue-rotate(0deg) brightness(95%);
      --glow-opacity: 0.10;
      --glow-opacity-hero: 0.16;
      --arch-box-bg: rgba(33, 19, 77, 0.8);
      --arch-box-border: #3d2785;
      --code-bg: rgba(255, 255, 255, 0.08);
      --code-surface: rgba(255, 255, 255, 0.04);
      --notes-bg: rgba(27, 13, 51, 0.97);
      --notes-shadow: -8px 0 24px rgba(0, 0, 0, 0.6);
      --hl-teal: #37a3a3;
      --hl-purple: #876fd4;
    }

    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body { background: var(--bg-primary, #000); }

    /* Marpit-generated CSS (includes Marpit reset + scoped rhqd theme) */
    {{MARPIT_CSS}}

    /* Shell: notes panel, controls, progress */
    .controls {
      position: fixed;
      bottom: var(--rh-space-lg, 24px);
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 var(--rh-space-3xl, 64px);
      font-family: var(--rh-font-family-code, 'Red Hat Mono', monospace);
      font-size: var(--rh-font-size-body-text-xs, 0.75rem);
      color: var(--text-muted, #a3a3a3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      z-index: 100;
      pointer-events: none;
    }
    .controls .nav-hint { opacity: 0.6; }
    .controls .progress .current { color: var(--accent, #ee0000); font-weight: 700; }

    .notes-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100vh;
      background: var(--notes-bg, rgba(20, 20, 20, 0.97));
      border-left: 2px solid var(--accent, #ee0000);
      padding: var(--rh-space-2xl, 48px) var(--rh-space-xl, 32px);
      overflow-y: auto;
      transition: right 0.3s ease-out;
      z-index: 200;
      font-family: var(--rh-font-family-body-text, 'Red Hat Text', sans-serif);
      font-size: var(--rh-font-size-body-text-md, 1rem);
      color: var(--text-secondary, #c7c7c7);
      line-height: 1.6;
      box-shadow: var(--notes-shadow, -8px 0 24px rgba(0, 0, 0, 0.5));
      box-sizing: border-box;
    }
    .notes-panel.visible { right: 0; }
    .notes-panel h3 {
      font-family: var(--rh-font-family-heading, 'Red Hat Display', sans-serif);
      color: var(--accent, #ee0000);
      font-size: var(--rh-font-size-heading-sm, 1.25rem);
      margin: 0 0 var(--rh-space-md, 16px) 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .notes-panel p { color: var(--text-secondary, #c7c7c7); margin: 0 0 var(--rh-space-md, 16px) 0; }
    .notes-panel a { color: var(--accent-light, #f56e6e); }
    .notes-panel ul { padding-left: 1.25rem; }

  </style>
</head>
<body class="{{BODY_CLASS}}">
  {{SLIDES_HTML}}

  <div class="notes-panel" aria-hidden="true">
    <h3>Contextual Notes</h3>
    <div class="notes-content"><p>Press <strong>N</strong> to toggle these notes.</p></div>
  </div>

  <div class="controls">
    <div class="nav-hint">← → or click to navigate · N for notes</div>
    <div class="progress"><span class="current">1</span> / <span class="total">1</span></div>
  </div>

  <script>
{{SHELL_JS}}
  </script>
</body>
</html>
